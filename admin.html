<!doctype html>
<html lang="en" class="h-full bg-slate-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyan Pathshala - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
        }
    </style>
</head>

<body class="h-full">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl hero-gradient flex items-center justify-center shadow-lg">
                        <span class="text-white font-bold text-lg">GP</span>
                    </div>
                    <span class="font-bold text-xl gradient-text">Admin Dashboard</span>
                </div>
                <div>
                    <a href="/" class="text-sm font-medium text-gray-500 hover:text-indigo-600 transition-colors">Back
                        to Site</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Inbox Messages</h1>
                <p class="text-gray-500 text-sm mt-1">View all inquiries submitted through the contact form.</p>
            </div>
            <button onclick="fetchMessages()"
                class="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-colors text-sm font-medium flex items-center gap-2">
                <span>🔄</span> Refresh
            </button>
        </div>

        <!-- Messages Container -->
        <div id="messages-container" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
            <!-- Loading State -->
            <div id="loading" class="col-span-full flex flex-col items-center justify-center py-20 text-gray-400">
                <span class="animate-spin text-4xl mb-4">⏳</span>
                <p>Loading messages...</p>
            </div>
        </div>
    </main>

    <script>
        // Format date consistently
        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString('en-IN', options);
        }

        // Fetch and display messages
        async function fetchMessages() {
            const container = document.getElementById('messages-container');
            const loading = document.getElementById('loading');

            try {
                // Keep loading spinner if it's there, or clear and show spinner if refreshing
                container.innerHTML = `<div id="loading" class="col-span-full flex flex-col items-center justify-center py-20 text-gray-400">
                    <span class="animate-spin text-4xl mb-4">⏳</span>
                    <p>Loading messages...</p>
                </div>`;

                const response = await fetch('/api/admin/messages');
                if (!response.ok) throw new Error('Failed to fetch messages');

                const messages = await response.json();
                container.innerHTML = ''; // Clear container

                if (messages.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center py-20 text-gray-400 bg-white rounded-2xl border border-dashed border-gray-300">
                            <span class="text-4xl mb-4">📭</span>
                            <p class="text-lg font-medium text-gray-900 mb-1">No messages yet</p>
                            <p>When someone contacts you, it will appear here.</p>
                        </div>
                    `;
                    return;
                }

                // Sort messages from newest to oldest
                messages.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                // Create cards for each message
                messages.forEach(msg => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-md transition-shadow flex flex-col h-full';

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4 gap-4">
                            <div>
                                <h3 class="font-bold text-gray-900 text-lg">${msg.name}</h3>
                                <div class="flex flex-col gap-1 mt-1">
                                    <a href="mailto:${msg.email}" class="text-sm text-indigo-600 hover:underline flex items-center gap-1">
                                        <span>📧</span> ${msg.email}
                                    </a>
                                    ${msg.phone ? `
                                    <a href="tel:${msg.phone}" class="text-sm text-gray-500 hover:text-indigo-600 flex items-center gap-1">
                                        <span>📞</span> ${msg.phone}
                                    </a>` : ''}
                                </div>
                            </div>
                            <span class="text-xs font-medium text-gray-400 bg-gray-50 px-2 py-1 rounded-md whitespace-nowrap">
                                ${formatDate(msg.createdAt)}
                            </span>
                        </div>
                        <div class="border-t border-gray-100 pt-4 mt-auto flex-grow">
                            <h4 class="text-sm font-semibold text-gray-900 mb-2">Subject: ${msg.subject}</h4>
                            <p class="text-gray-600 text-sm whitespace-pre-wrap leading-relaxed">${msg.message}</p>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading messages:', error);
                container.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-red-500 bg-red-50 rounded-2xl">
                        <span class="text-4xl mb-4">⚠️</span>
                        <p class="font-medium">Failed to load messages</p>
                        <p class="text-sm mt-1 text-red-400">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load initially
        fetchMessages();
    </script>
</body>

</html>
